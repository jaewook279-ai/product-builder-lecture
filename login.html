<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>외식전문가 — 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Gmarket+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
<div class="card">
  <div class="card-top">
    <a href="index.html" class="card-logo" style="text-decoration:none;">🍽️</a>
    <div class="card-title">다시 만나서 반가워요!</div>
    <div class="card-sub">외식전문가에 로그인하세요</div>
  </div>
  <div class="card-body">
    <div class="social-btns">
      <button class="social-btn kakao" id="kakaoLoginBtn">🟡 카카오</button>
      <button class="social-btn naver" id="naverLoginBtn">🟢 네이버</button>
    </div>
    <div class="divider"><span>또는 이메일로 로그인</span></div>
    
    <div class="error-box" id="errorBox">⚠️ 이메일 또는 비밀번호가 올바르지 않습니다</div>
    
    <div class="form-group">
      <label for="emailIn">이메일</label>
      <div class="input-wrap">
        <span class="input-icon">📧</span>
        <input type="email" id="emailIn" placeholder="example@email.com">
      </div>
    </div>
    
    <div class="form-group">
      <label for="pwIn">비밀번호</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="pwIn" placeholder="비밀번호 입력">
        <span class="pw-toggle" id="pwToggle">👁️</span>
      </div>
    </div>
    
    <div class="form-options">
      <div class="remember" id="rememberBtn">
        <div class="chk-sm" id="remChk"></div>
        <span>로그인 유지</span>
      </div>
      <a href="#" class="forgot-link" id="forgotPwLink">비밀번호 찾기</a>
    </div>
    
    <button class="submit-btn" id="loginSubmitBtn">🔑 로그인</button>
  </div>
  <div class="card-foot">
    아직 계정이 없으신가요? <a href="signup.html">무료로 시작하기</a>
  </div>
</div>

<div id="toastEl"><span id="toastMsg"></span></div>

<script src="login.js"></script>
</body>
</html>

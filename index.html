<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <button id="theme-toggle">Dark Mode</button>
        <h1>Lotto Number Generator</h1>
        <nav class="grade-menu">
            <button class="grade-btn active" data-count="1">Bronze</button>
            <button class="grade-btn" data-count="3">Silver</button>
            <button class="grade-btn" data-count="5">Gold</button>
        </nav>
    </header>
    <main>
        <lotto-generator count="1"></lotto-generator>
    </main>
    <script src="main.js"></script>
</body>
</html>
